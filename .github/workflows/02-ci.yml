# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

#env:
#  python_version: '3.12'
on:

  schedule:
    # Runs at 10:00 UTC every single day
    - cron: '00 10 * * *'

  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:

jobs:
  run-tests:
    strategy:
      matrix:
        version: [3.12, 3.13]  
        os: [ubuntu-latest, macos-latest]  

    # The runner is the temporary machine that executes the steps below.
    runs-on: ${{matrix.os}}


    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Check repo files

        run: ls -R


      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6

        with:
          python-version: ${{ matrix.version }}

      - name: Check Python version
        
        run: python --version

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v


      - name: time at finish

        run: date +"%r"


      - name: Run Trivy vulnerability scanner on filesystem
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'


      - name: Run Trivy vulnerability scanner on Dockerfile
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: 'config'
          scan-ref: 'Dockerfile'
