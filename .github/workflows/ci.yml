# This workflow packages the verified app.
# It is manual on purpose so Day 1 stays focused on CI.
name: CI Workflow

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  security-events: write

env:
  # Keep common image values in one place so the build steps stay readable.
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  IMAGE_METADATA: image-metadata.env
  ARTIFACT_NAME: tiny-health-app-image
  ECR_REPOSITORY: github/day2

jobs:
  build-package:
    # Use a fresh GitHub-hosted runner for the build.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # Get the repository files onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        # Prepare Python so the workflow can run the tests first.
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        # Build only after the verification step passes.
        run: python -m unittest discover -s tests -v

      - name: Set image tag
        # Use today's UTC date plus the GitHub run ID.
        # This keeps the tag easy to explain and still unique for the run.
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        # Create the packaged application image with both ECR and local tags.
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:${{env.IMAGE_NAME}}-${{ steps.image-tag.outputs.image_tag }}" \
            -t "$IMAGE_NAME:${{ steps.image-tag.outputs.image_tag }}" \
            .

      - name: Push Image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:${{env.IMAGE_NAME}}-${{ steps.image-tag.outputs.image_tag }}"

      - name: Save Docker image as artifact file
        # Convert that exact tagged image into a file that can be reused later.
        run: docker save "$IMAGE_NAME:${{ steps.image-tag.outputs.image_tag }}" -o "${IMAGE_TAR}"

      - name: Run Trivy scanner on the tarball artifact
        # Scan the actual saved .tar archive file and output to a SARIF file.
        uses: aquasecurity/trivy-action@master
        with:
          input: "${{ env.IMAGE_TAR }}"
          format: 'sarif'                  
          output: 'trivy-results.sarif'    
          exit-code: '0'                   
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Save image metadata
        # Keep the exact built image reference alongside the tar file.
        env:
          ECR_REGISTRY: "$ECR_REGISTRY/$ECR_REPOSITORY:${{env.IMAGE_NAME}}-${{ steps.image-tag.outputs.image_tag }}"
        run: |
          IMAGE_REFERENCE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_NAME:${{ steps.image-tag.outputs.image_tag }}"
          printf 'IMAGE_TAG=%s\n' "${{ steps.image-tag.outputs.image_tag }}" > "${IMAGE_