name: CI and Build Artifact Workflow

on:
  schedule:
    # Runs at 10:00 UTC every single day
    - cron: '00 10 * * *'

  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/**" # Triggers on any workflow changes

  # Allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------
  # JOB 1: Continuous Integration (Verification)
  # ---------------------------------------------------------
  run-tests:
    strategy:
      matrix:
        version: [3.12, 3.13]  
        os: [ubuntu-latest, macos-latest]  

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check repo files
        run: ls -R

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}

      - name: Check Python version
        run: python --version

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Time at finish
        run: date +"%r"

      - name: Run Trivy vulnerability scanner on filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Run Trivy vulnerability scanner on Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'Dockerfile'

      - name: Check Linting
        uses: astral-sh/ruff-action@v3
        with:
          src: './app'

  # ---------------------------------------------------------
  # JOB 2: Build & Package (Executes only if Job 1 passes)
  # ---------------------------------------------------------
  build-package:
    needs: run-tests # <--- This enforces that tests must pass first
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write
      
    env:
      IMAGE_NAME: tiny-health-app
      IMAGE_TAR: tiny-health-app.tar
      IMAGE_METADATA: image-metadata.env
      ARTIFACT_NAME: tiny-health-app-image
     

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build Docker image with docker build
        run: |
          docker build \
            -t "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" \
            .

      - name: Save Docker image as artifact file
        run: docker save "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" -o "${IMAGE_TAR}"

      - name: Run Trivy scanner on the tarball artifact
        uses: aquasecurity/trivy-action@master
        with:
          input: "${{ env.IMAGE_TAR }}"
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Save image metadata
        run: |
          IMAGE_REFERENCE="${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}"
          printf 'IMAGE_TAG=%s\n' "${{ steps.image-tag.outputs.image_tag }}" > "${IMAGE_METADATA}"
          printf 'IMAGE_REFERENCE=%s\n' "${IMAGE_REFERENCE}" >> "${IMAGE_METADATA}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ env.IMAGE_TAR }}
            ${{ env.IMAGE_METADATA }}
          retention-days: 7
