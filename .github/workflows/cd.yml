name: cd workflow

on:
  pull_request:
    branches:
      - main
    types:
      - closed

env:
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"
  IMAGE: "254652353999.dkr.ecr.us-east-1.amazonaws.com/github/day2:latest"

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add EC2 host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            set -e

            IMAGE=${{env.IMAGE}}

            echo "Logging into ECR..."

            aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin \
            254652353999.dkr.ecr.us-east-1.amazonaws.com

            echo "Pulling latest image..."

            docker pull $IMAGE

            echo "Stopping old container..."

            docker rm -f tiny-health-container || true

            echo "Starting new container..."

            docker run -d \
              --name tiny-health-container \
              -p 8000:8000 \
              --restart unless-stopped \
              $IMAGE

            echo "Deployment complete."

          EOF

